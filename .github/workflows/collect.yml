name: collect

on:
  schedule:
    # JST平日 8時台: UTC日曜〜木曜 23時台を20分毎
    - cron: "*/20 23 * * 0-4"
    # JST平日 9:00-18:59: UTC月〜金 0-9時台を20分毎
    - cron: "*/20 0-9 * * 1-5"
    # JST毎日 19:00-翌7:00: 1時間毎(海外時間のニュース・取りこぼし対策)
    - cron: "0 10-22 * * *"
    # JST土日 8:00-18:59: 1時間毎
    - cron: "0 23 * * 5,6"
    - cron: "0 0-9 * * 6,0"
  workflow_dispatch: {}

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 依存インストール
        run: pip install --quiet -r requirements.txt
      - name: 収集・通知
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m collector.run
      - name: データをcommit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "収集データ更新 ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') JST)"
            git pull --rebase origin master
            git push
          else
            echo "新着なし"
          fi
